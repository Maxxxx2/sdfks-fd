<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact - Mon Maillot de Foot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">
    <img src="logo.png">
    <span>Mon Maillot de Foot</span>
  </div>

  <nav class="nav">
    <a href="Index.html">Accueil</a>
    <a href="Maillots.html">Maillots</a>
    <a href="Speciales cup 2026.html">Spéciales cup 2026</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>

  <div class="actions">
    <div class="cart">
      🛒
      <span class="cart-count">0</span>
    </div>
  </div>
</header>

<!-- CONTACT -->
<section class="contact-page">

  <h1>📩 Contactez-nous</h1>

  <div class="contact-container">

    <!-- FORMULAIRE -->
    <div class="contact-form">

      <input type="text" id="contactName" placeholder="Nom">
      <input type="email" id="contactEmail" placeholder="Email">
      <textarea id="contactMessage" placeholder="Votre message..."></textarea>

      <button onclick="sendContact()">Envoyer</button>

    </div>

    <!-- INFOS -->
    <div class="contact-info">
      <h3>📍 Informations</h3>
      <p>Email : support@monmaillot.com</p>
      <p>Réponse sous 24h</p>

      <h3>⚽ À propos</h3>
      <p>Nous proposons les meilleurs maillots au meilleur prix 🔥</p>
    </div>

  </div>

</section>

<footer>
  <p>© 2026 Mon Maillot de Foot</p>
</footer>

<script src="Scipt.js" defer></script>

</body>
</html>
