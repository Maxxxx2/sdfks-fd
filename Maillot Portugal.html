<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Maillot Portugal 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  
  <div class="logo">
    <img src="/Images/Logo.png" alt="logo">
    <span>Mon Maillot de Foot</span>
  </div>

  <nav class="nav">
    <a href="Index.html">Accueil</a>
    <a href="Maillots.html">Maillots</a>
    <a href="Speciales cup 2026.html">Spéciales cup 2026</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>


  <div class="actions">
    <div class="cart">
      <svg viewBox="0 0 24 24" width="24">
        <path d="M7 4h-2l-1 2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 
        0 1.1.9 2 2 2h10v-2h-9.42c-.14 0-.25-.11-.25-.25l.03-.12 
        .9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 
        0-.55-.45-1-1-1h-14.31l-.94-2z"/>
      </svg>
      <span class="cart-count">0</span>
    </div>
  </div>

</header>

<!-- PAGE PRODUIT -->
<section class="product-page">

  <div class="product-container">

    <!-- IMAGE -->
    <div class="product-image">
      <div class="product-gallery">

  <!-- IMAGE PRINCIPALE -->
  <img id="mainImage" src="/Images/Maillot first page/92f17765.png">

  <!-- MINIATURES -->
  <div class="thumbnails">
    <img src="/Images/Maillot first page/92f17765.png" onclick="changeImage(this)">
    <img src="/Page produit/Maillot Portugal 2026/14.jpg" onclick="changeImage(this)">
    <img src="/Page produit/Maillot Portugal 2026/2.jpg" onclick="changeImage(this)">
  </div>

</div>
    </div>

    <!-- INFOS -->
    <div class="product-info">

      <h1>Maillot Portugal 2026</h1>

      <p class="price">16.99€</p>

      <p class="desc">
        Maillot officiel édition 2026 ⚽<br>
        Tissu respirant, léger et confortable.<br>
        Idéal pour jouer ou supporter ton équipe !
      </p>

      <!-- TAILLES -->
      <div class="sizes">
  <p>Taille :</p>

  <div class="size-buttons">
  <button class="size-btn" onclick="selectSize(this)">S</button>
  <button class="size-btn" onclick="selectSize(this)">M</button>
  <button class="size-btn" onclick="selectSize(this)">L</button>
  <button class="size-btn" onclick="selectSize(this)">XL</button>
</div>

      <!-- BOUTON -->
      <button class="add-to-cart"
        data-name="Maillot Portugal 2026"
        data-price="16.99"
        data-img="/Images/Maillot first page/92f17765.png">
        🛒 Ajouter au panier
      </button>

    </div>

  </div>

</section>

<!-- PANIER -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>Mon panier</h2>
    <span id="closeCart">&times;</span>
  </div>

  <div class="cart-items" id="cartItems"></div>

<div class="cart-footer">
    <p>Total: <span id="cartTotal">0€</span></p>
  </div>
  <button onclick="window.location.href='/base/checkout.html'">
  💳 Passer au paiement
</button>
</div>

<div class="overlay" id="overlay"></div>

<script src="Scipt.js" defer></script>

</body>
</html>
