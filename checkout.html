<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="logo.png">
    <span>Mon Maillot de Foot</span>
  </div>
</header>

<section class="checkout">

  <h1>🧾 Finaliser la commande</h1>

  <div class="checkout-container">

    <!-- PANIER -->
    <div class="checkout-cart">
      <h2>Ton panier</h2>

      <div id="checkoutItems"></div>

      <h3>Total: <span id="checkoutTotal">0€</span></h3>
    </div>

    <!-- FORMULAIRE -->
    <div class="checkout-form">

      <h2>Informations</h2>

      <input id="name" type="text" placeholder="Nom complet">
      <input id="email" type="email" placeholder="Email">

      <h3>Livraison</h3>

      <input id="address" type="text" placeholder="Adresse">
      <input id="city" type="text" placeholder="Ville">
      <input id="zip" type="text" placeholder="Code postal">

      <button onclick="checkout()">💳 Commander</button>

    </div>

  </div>

</section>

<script src="Scipt.js"></script>

</body>
</html>
